<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel — Fake Ninja</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#060608;--card:#0d0d12;--border:#1a1a24;--accent:#00e5ff;--green:#00ff88;--warn:#ffbb00;--red:#ff3355;--text:#c8cdd8;--dim:#454a58}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;padding:20px 16px}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
  .wrap{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
  .logo{text-align:center;padding:10px 0 4px}
  .logo h1{font-size:22px;font-weight:700;letter-spacing:4px;color:#fff}
  .logo h1 span{color:var(--accent)}
  .logo p{font-size:9px;color:var(--dim);letter-spacing:3px;margin-top:2px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
  .card-label{font-size:8px;font-weight:700;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:12px}
  input{width:100%;background:#000;border:1px solid var(--border);border-radius:6px;padding:12px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;margin-bottom:8px}
  input:focus{border-color:var(--accent)}
  input::placeholder{color:var(--dim)}
  .btn{width:100%;padding:12px;border:none;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .18s}
  .btn-primary{background:var(--accent);color:#000}
  .btn-primary:hover{filter:brightness(1.1)}
  .btn-danger{background:var(--red);color:#fff}
  .btn-warn{background:transparent;border:1px solid var(--warn);color:var(--warn)}
  .btn-green{background:var(--green);color:#000}
  .btn-sm{width:auto;padding:6px 14px;font-size:11px;margin:0}
  .stats{display:flex;gap:8px;flex-wrap:wrap}
  .stat-box{flex:1;min-width:80px;background:#000;border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center}
  .stat-num{font-size:28px;font-weight:700;color:var(--accent);font-family:'Share Tech Mono',monospace}
  .stat-lbl{font-size:9px;color:var(--dim);letter-spacing:2px;margin-top:2px}
  .key-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .key-item{background:#000;border:1px solid var(--border);border-radius:6px;padding:12px}
  .key-name{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--accent);letter-spacing:1px;margin-bottom:6px}
  .key-meta{font-size:10px;color:var(--dim);font-family:'Share Tech Mono',monospace;margin-bottom:8px;line-height:1.7}
  .key-meta span{color:var(--text)}
  .key-actions{display:flex;gap:6px;flex-wrap:wrap}
  .timer{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700}
  .empty{text-align:center;color:var(--dim);font-size:12px;font-family:'Share Tech Mono',monospace;padding:20px 0}
  #login-section{}
  #main-section{display:none}
  .row{display:flex;gap:8px}
  .row input{margin-bottom:0}
  .row-small{font-size:11px;color:var(--dim);margin-bottom:8px;font-family:'Share Tech Mono',monospace}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1px}
  .badge-on{background:rgba(0,255,136,.15);color:var(--green);border:1px solid var(--green)}
  .badge-off{background:rgba(255,51,85,.15);color:var(--red);border:1px solid var(--red)}
  .msg{font-size:11px;font-family:'Share Tech Mono',monospace;text-align:center;padding:8px;border-radius:4px;margin-top:6px}
  .msg-ok{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3)}
  .msg-err{background:rgba(255,51,85,.1);color:var(--red);border:1px solid rgba(255,51,85,.3)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .refresh-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-family:'Rajdhani',sans-serif;letter-spacing:1px}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>FAKE <span>NINJA</span></h1>
    <p>ADMIN PANEL</p>
  </div>

  <!-- LOGIN -->
  <div class="card" id="login-section">
    <div class="card-label">Admin Login</div>
    <input type="password" id="inp-pass" placeholder="Admin Password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn btn-primary" onclick="doLogin()">🔐 &nbsp;LOGIN</button>
    <div id="login-msg"></div>
  </div>

  <!-- MAIN -->
  <div id="main-section">

    <!-- STATS -->
    <div class="card">
      <div class="section-header">
        <div class="card-label" style="margin:0">Overview</div>
        <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
      </div>
      <div class="stats">
        <div class="stat-box"><div class="stat-num" id="st-keys">—</div><div class="stat-lbl">ACTIVE KEYS</div></div>
        <div class="stat-box"><div class="stat-num" id="st-tokens">—</div><div class="stat-lbl">TOKENS</div></div>
        <div class="stat-box"><div class="stat-num" id="st-cools">—</div><div class="stat-lbl">COOLDOWNS</div></div>
      </div>
    </div>

    <!-- ADD KEY -->
    <div class="card">
      <div class="card-label">Add Key Manual</div>
      <input type="text" id="inp-key" placeholder="NINJA-XXXX-XXXX-XXXX (kosongkan = auto generate)"/>
      <input type="text" id="inp-devid" placeholder="Device ID (opsional)"/>
      <div class="row" style="margin-bottom:8px">
        <input type="number" id="inp-hours" placeholder="Durasi (jam)" value="3" style="margin-bottom:0"/>
        <input type="number" id="inp-maxdev" placeholder="Max Device" value="1" min="1" max="100" style="margin-bottom:0"/>
      </div>
      <button class="btn btn-green" onclick="doAdd()">➕ ADD KEY</button>
      <div id="add-msg"></div>
    </div>

    <!-- KEY LIST -->
    <div class="card">
      <div class="section-header">
        <div class="card-label" style="margin:0">Active Keys</div>
        <div style="display:flex;gap:6px">
          <button class="refresh-btn" onclick="loadKeys()">↻</button>
          <button class="refresh-btn" style="border-color:var(--red);color:var(--red)" onclick="doDeleteAll()">🗑️ Hapus Semua</button>
          <button class="refresh-btn" style="border-color:#ff6600;color:#ff6600" onclick="doResetAll()">⚡ Reset Total</button>
        </div>
      </div>
      <div class="key-list" id="key-list">
        <div class="empty">Loading...</div>
      </div>
    </div>

  </div>
</div>

<script>
const SERVER = 'https://fake-ninja-key-server.vercel.app/api/admin';
let ADMIN_SECRET = '';

function fmtTime(ms) {
  if(ms<=0) return 'EXPIRED';
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60;
  if(h>0) return h+'h '+m+'m '+sc+'s';
  if(m>0) return m+'m '+sc+'s';
  return sc+'s';
}
function fmtDate(ms) {
  if(!ms) return '—';
  return new Date(ms).toLocaleString('id-ID');
}

async function api(action, body) {
  const res = await fetch(SERVER+'?action='+action, {
    method: 'POST',
    headers: {'Content-Type':'application/json','x-admin-secret':ADMIN_SECRET},
    body: JSON.stringify(body||{})
  });
  return res.json();
}

async function doLogin() {
  const pass = document.getElementById('inp-pass').value.trim();
  const msg  = document.getElementById('login-msg');
  if(!pass) return;
  msg.innerHTML = '<div class="msg">⏳ Checking...</div>';
  try {
    const res = await fetch(SERVER+'?action=login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password: pass})
    });
    const data = await res.json();
    if(data.ok) {
      ADMIN_SECRET = pass;
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('main-section').style.display = 'block';
      loadAll();
    } else {
      msg.innerHTML = '<div class="msg msg-err">❌ Password salah</div>';
    }
  } catch(e) {
    msg.innerHTML = '<div class="msg msg-err">❌ Gagal konek ke server</div>';
  }
}

async function loadAll() {
  loadStats();
  loadKeys();
}

async function loadStats() {
  try {
    const data = await api('stats');
    if(data.ok) {
      document.getElementById('st-keys').textContent   = data.totalKeys;
      document.getElementById('st-tokens').textContent = data.totalTokens;
      document.getElementById('st-cools').textContent  = data.totalCooldowns;
    }
  } catch(e) {}
}

async function loadKeys() {
  const list = document.getElementById('key-list');
  list.innerHTML = '<div class="empty"><span class="spin"></span> Loading...</div>';
  try {
    const data = await api('list');
    if(!data.ok || !data.keys || data.keys.length===0) {
      list.innerHTML = '<div class="empty">Tidak ada key aktif</div>';
      return;
    }
    list.innerHTML = '';
    data.keys.forEach(k => {
      const div = document.createElement('div');
      div.className = 'key-item';
      div.id = 'ki-'+k.key;
      const rem = k.expiryMs - Date.now();
      div.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div class="key-name">${k.key}</div>
          <span class="badge ${k.active?'badge-on':'badge-off'}">${k.active?'ACTIVE':'DISABLED'}</span>
        </div>
        <div class="key-meta">
          ⏱ Sisa: <span class="timer" data-expiry="${k.expiryMs}" style="color:${rem<10*60*1000?'var(--red)':rem<30*60*1000?'var(--warn)':'var(--green)'}">${fmtTime(rem)}</span><br>
          📅 Dibuat: <span>${fmtDate(k.createdAt)}</span><br>
          📱 Device: <span style="color:${k.deviceCount>=k.maxDevice?'var(--red)':'var(--green)'}">${k.deviceCount}/${k.maxDevice}</span><br>
          🔑 FP: <span>${k.fp?k.fp.substring(0,12)+'...':'—'}</span>
        </div>
        <div class="key-actions">
          <button class="btn btn-warn btn-sm" onclick="doToggle('${k.key}')">${k.active?'🚫 Disable':'✅ Enable'}</button>
          <button class="btn btn-danger btn-sm" onclick="doDelete('${k.key}')">🗑️ Hapus</button>
        </div>
      `;
      list.appendChild(div);
    });
    // Start countdown timers
    startTimers();
  } catch(e) {
    list.innerHTML = '<div class="empty" style="color:var(--red)">❌ Gagal load data</div>';
  }
}

function startTimers() {
  clearInterval(window._timerInterval);
  window._timerInterval = setInterval(() => {
    document.querySelectorAll('.timer[data-expiry]').forEach(el => {
      const rem = parseInt(el.dataset.expiry) - Date.now();
      el.textContent = fmtTime(rem);
      el.style.color = rem<10*60*1000?'var(--red)':rem<30*60*1000?'var(--warn)':'var(--green)';
      if(rem<=0) loadKeys();
    });
  }, 1000);
}

async function doDelete(key) {
  if(!confirm('Hapus key '+key+'?')) return;
  const data = await api('delete', {key});
  if(data.ok) {
    const el = document.getElementById('ki-'+key);
    if(el) el.remove();
    loadStats();
    if(document.getElementById('key-list').children.length===0)
      document.getElementById('key-list').innerHTML='<div class="empty">Tidak ada key aktif</div>';
  } else {
    alert('Gagal hapus: '+data.error);
  }
}

async function doToggle(key) {
  const data = await api('toggle', {key});
  if(data.ok) loadKeys();
  else alert('Gagal: '+data.error);
}

async function doResetAll() {
  if(!confirm('⚠️ RESET TOTAL akan menghapus:\n- Semua key aktif\n- Semua cooldown\n- Semua devkey\n- Semua token\n\nSemua user bisa GET KEY lagi!\n\nLanjutkan?')) return;
  const data = await api('reset_all');
  if(data.ok) {
    document.getElementById('key-list').innerHTML = '<div class="empty">Tidak ada key aktif</div>';
    document.getElementById('st-keys').textContent = '0';
    document.getElementById('st-tokens').textContent = '0';
    document.getElementById('st-cools').textContent = '0';
    alert('✅ Reset total berhasil! ' + data.deleted + ' data dihapus.\nSemua user sekarang bisa GET KEY lagi.');
  } else {
    alert('❌ Gagal: ' + data.error);
  }
}

async function doDeleteAll() {
  const total = document.getElementById('st-keys').textContent;
  if(!confirm('Hapus SEMUA ' + total + ' key aktif? Tindakan ini tidak bisa dibatalkan!')) return;
  const data = await api('delete_all');
  if(data.ok) {
    document.getElementById('key-list').innerHTML = '<div class="empty">Tidak ada key aktif</div>';
    loadStats();
    alert('✅ ' + data.deleted + ' key berhasil dihapus!');
  } else {
    alert('❌ Gagal: ' + data.error);
  }
}

async function doAdd() {
  const key       = document.getElementById('inp-key').value.trim().toUpperCase();
  const devId     = document.getElementById('inp-devid').value.trim();
  const hours     = parseFloat(document.getElementById('inp-hours').value)||3;
  const maxDevice = parseInt(document.getElementById('inp-maxdev').value)||1;
  const msg       = document.getElementById('add-msg');

  msg.innerHTML = '<div class="msg">⏳ Adding...</div>';
  const data = await api('add', {key, devId, hours, maxDevice});
  if(data.ok) {
    msg.innerHTML = `<div class="msg msg-ok">✅ Key ditambahkan: ${data.key} (${data.hours} jam, max ${data.maxDevice} device)</div>`;
    document.getElementById('inp-key').value='';
    document.getElementById('inp-devid').value='';
    loadKeys();
    loadStats();
  } else {
    msg.innerHTML = `<div class="msg msg-err">❌ ${data.error||'Gagal'}: ${data.hint||''}</div>`;
  }
}
</script>
</body>
</html>
